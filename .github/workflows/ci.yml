name: CI Pipeline

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: 3. Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 4. Validar Banco de Dados (Supabase Start)
        run: supabase db start

      - name: 5. Executar Linter (Angular)
        run: npm run lint -w apps/web --if-present

      - name: 6. Executar Testes Unitários em Headless (Angular)
        run: npm run test -w apps/web -- --watch=false --browsers=ChromeHeadless
